{# Delete activity confirmation modal — include once per page #}
<div id="activityDeleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" aria-hidden="true">
  <div class="absolute inset-0 bg-slate-900/50" data-activity-delete-close></div>
  <div class="relative bg-white rounded-2xl shadow-xl max-w-md w-full p-6 z-10">
    <div class="flex items-start gap-3 mb-4">
      <div class="w-10 h-10 rounded-full bg-red-100 flex items-center justify-center shrink-0">
        <i class="fas fa-trash-can text-red-600"></i>
      </div>
      <div>
        <h3 class="text-lg font-bold text-slate-800">Delete Activity?</h3>
        <p class="text-sm text-slate-500 mt-1">You are about to remove:</p>
      </div>
    </div>

    <div class="mb-4 p-3 bg-slate-50 rounded-xl">
      <div id="activityDeleteTitle" class="font-semibold text-slate-800 text-sm"></div>
      <div id="activityDeleteSchedule" class="text-xs text-slate-500 mt-1"></div>
      <p class="text-xs text-amber-700 mt-2">This may affect reminders and compliance tracking.</p>
    </div>

    <div id="activityDeleteScopeWrap" class="hidden mb-4 space-y-2">
      <div class="text-xs font-semibold text-slate-500 uppercase tracking-wide">Delete</div>
      <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
        <input type="radio" name="delete_scope" value="occurrence" class="text-red-600">
        Only this occurrence
      </label>
      <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
        <input type="radio" name="delete_scope" value="future" class="text-red-600">
        Future occurrences
      </label>
      <label class="flex items-center gap-2 text-sm text-slate-700 cursor-pointer">
        <input type="radio" name="delete_scope" value="entire" class="text-red-600" checked>
        Entire schedule
      </label>
    </div>

    <div class="mb-5">
      <label class="block text-sm font-semibold text-slate-700 mb-1.5">Reason for deletion <span class="text-red-500">*</span></label>
      <textarea id="activityDeleteReason" rows="3" placeholder="e.g. Patient shifted to physiotherapy"
                class="w-full px-3 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm resize-none focus:ring-2 focus:ring-red-500"></textarea>
    </div>

    <input type="hidden" id="activityDeleteId" value="">
    <input type="hidden" id="activityDeleteEffectiveDate" value="">

    <div class="flex gap-3">
      <button type="button" data-activity-delete-close
              class="flex-1 py-2.5 bg-slate-100 text-slate-700 rounded-xl font-semibold text-sm hover:bg-slate-200 transition">
        Cancel
      </button>
      <button type="button" id="activityDeleteConfirm"
              class="flex-1 py-2.5 bg-red-600 text-white rounded-xl font-semibold text-sm hover:bg-red-700 transition">
        Delete Activity
      </button>
    </div>
  </div>
</div>
