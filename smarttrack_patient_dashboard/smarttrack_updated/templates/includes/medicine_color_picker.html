{% load static %}
<div class="col-span-2">
  <label class="block text-sm font-medium text-slate-700 mb-2">Color Label</label>
  <p class="text-xs text-slate-500 mb-3">Quick Colors</p>
  <div class="flex flex-wrap gap-2 mb-4">
    {% for val, label, hex in quick_colors %}
    <label class="cursor-pointer">
      <input type="radio" name="color" value="{{ val }}" class="sr-only peer color-quick-radio"
             {% if medicine.color == val or not medicine and val == 'blue' %}checked{% endif %}>
      <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full border-2 border-transparent peer-checked:border-slate-800 text-xs font-semibold transition"
            style="background-color:{{ hex }}22;color:{{ hex }}">
        <span class="w-3 h-3 rounded-full" style="background-color:{{ hex }}"></span>{{ label }}
      </span>
    </label>
    {% endfor %}
  </div>
  <p class="text-xs text-slate-500 mb-2">OR Custom Color</p>
  <div class="flex flex-wrap items-center gap-3 p-3 bg-slate-50 border border-slate-200 rounded-xl">
    <label class="flex items-center gap-2 cursor-pointer">
      <input type="radio" name="color" value="custom" class="color-custom-radio"
             {% if medicine.color and medicine.color not in quick_color_values %}checked{% endif %}>
      <span class="text-xs font-medium text-slate-600">Custom</span>
    </label>
    <input type="color" id="customColorPicker" value="#3b82f6"
           class="w-10 h-10 rounded-lg border border-slate-300 cursor-pointer p-0.5">
    <input type="text" name="custom_color" id="customColorText"
           placeholder="orange, skyblue, pink, #FF5733"
           value="{% if medicine.color and medicine.color not in quick_color_values %}{{ medicine.color }}{% endif %}"
           class="flex-1 min-w-[160px] px-3 py-2 border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
  </div>
</div>
<script>
(function() {
  const quickRadios = document.querySelectorAll('.color-quick-radio');
  const customRadio = document.querySelector('.color-custom-radio');
  const picker = document.getElementById('customColorPicker');
  const text = document.getElementById('customColorText');
  if (!picker || !text) return;

  function syncPickerFromText() {
    const v = text.value.trim();
    if (/^#[0-9A-Fa-f]{6}$/.test(v)) picker.value = v;
  }
  picker.addEventListener('input', function() {
    if (customRadio) customRadio.checked = true;
    text.value = picker.value;
  });
  text.addEventListener('input', function() {
    if (customRadio) customRadio.checked = true;
    syncPickerFromText();
  });
  quickRadios.forEach(r => r.addEventListener('change', function() {
    if (this.checked) text.value = '';
  }));
  syncPickerFromText();
})();
</script>
