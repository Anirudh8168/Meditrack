<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}SmartTrack{% endblock %} - Healthcare Management</title>

{% load static %}

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.tailwindcss.com"></script>

<script>

tailwind.config = {

  theme: {

    extend: {

      fontFamily: { sans: ['Inter', 'sans-serif'] },

      colors: {

        primary: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' },

        accent: { 400:'#a78bfa',500:'#8b5cf6',600:'#7c3aed' },

        success: '#10b981',

        warning: '#f59e0b',

        danger: '#ef4444',

      }

    }

  }

}

</script>

<link rel="stylesheet" href="{% static 'css/main.css' %}">
<link rel="stylesheet" href="{% static 'css/mobile_responsive.css' %}?v=2">

{% block extra_head %}{% endblock %}

</head>

<body class="bg-slate-50 font-sans text-slate-800">

{% block body %}{% endblock %}

<script src="{% static 'js/smarttrack_ui.js' %}?v=2"></script>

<script src="{% static 'js/main.js' %}?v=20260530"></script>

{% block extra_js %}{% endblock %}

</body>

</html>
