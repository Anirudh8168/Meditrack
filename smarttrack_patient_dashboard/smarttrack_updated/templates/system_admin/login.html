{% extends 'base.html' %}
{% block title %}SmartTrack Admin Login{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md animate-fade-in">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-violet-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-500/30">
        <i class="fas fa-heartbeat text-white text-2xl"></i>
      </div>
      <h1 class="text-2xl font-bold text-white">SmartTrack Admin</h1>
      <p class="text-slate-400 text-sm mt-1">Enterprise healthcare administration portal</p>
    </div>
    <div class="bg-white rounded-2xl shadow-2xl p-8">
      {% if error %}<div class="mb-4 p-3 bg-red-50 text-red-700 rounded-xl text-sm border border-red-200">{{ error }}</div>{% endif %}
      <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Admin Email</label>
          <input type="email" name="email" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="admin@smarttrack.com">
        </div>
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
          <input type="password" name="password" required class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition" placeholder="••••••••">
        </div>
        <button type="submit" class="w-full py-3 bg-gradient-to-r from-blue-600 to-violet-600 hover:from-blue-700 hover:to-violet-700 text-white font-semibold rounded-xl transition shadow-lg shadow-blue-500/20">Sign In to Admin Panel</button>
      </form>
      <p class="text-xs text-slate-400 text-center mt-6"><i class="fas fa-shield-halved mr-1"></i> Authorized administrators only. All access is logged.</p>
    </div>
  </div>
</div>
{% endblock %}
