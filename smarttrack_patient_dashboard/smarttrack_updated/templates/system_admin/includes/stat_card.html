<div class="admin-stat-card">
  <div class="admin-stat-icon {{ icon_bg|default:'bg-blue-50 text-blue-600' }}">
    <i class="fas {{ icon }}"></i>
  </div>
  <div class="admin-stat-value">{{ value }}</div>
  <div class="admin-stat-label">{{ label }}</div>
  {% if trend %}
  <div class="admin-stat-trend {{ trend_class|default:'up' }}">
    {% if trend_class == 'up' %}<i class="fas fa-arrow-up text-[10px]"></i>{% elif trend_class == 'down' %}<i class="fas fa-arrow-down text-[10px]"></i>{% endif %}
    {{ trend }}
  </div>
  {% endif %}
</div>
