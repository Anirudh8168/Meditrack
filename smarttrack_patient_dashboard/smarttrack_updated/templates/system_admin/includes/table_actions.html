<div class="admin-action-group">
  <a href="{{ view_url }}" class="admin-btn-action admin-btn-view-sm" title="View"><i class="fas fa-eye"></i><span>View</span></a>
  <a href="{{ edit_url }}" class="admin-btn-action admin-btn-edit-sm" title="Edit"><i class="fas fa-pen"></i><span>Edit</span></a>
  <button type="button"
    class="admin-btn-action admin-btn-delete-sm"
    title="Delete"
    data-delete-url="{{ delete_url }}"
    data-delete-name="{{ delete_name|default:'this record' }}"
    {% if delete_warning %}data-delete-warning="{{ delete_warning }}"{% endif %}>
    <i class="fas fa-trash"></i><span>Delete</span>
  </button>
</div>
