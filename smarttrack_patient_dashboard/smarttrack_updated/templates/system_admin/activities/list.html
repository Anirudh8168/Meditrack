{% extends 'system_admin/base.html' %}
{% block content %}
<div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
  <table class="w-full text-sm"><thead><tr class="bg-slate-50 text-xs uppercase"><th class="px-5 py-3 text-left">Patient</th><th class="px-4 py-3">Activity</th><th class="px-4 py-3">Recorded</th></tr></thead>
  <tbody>{% for a in page %}<tr class="border-b"><td class="px-5 py-3">{{ a.patient.get_full_name }}</td><td class="px-4 py-3">{{ a.activity_type }}</td><td class="px-4 py-3">{{ a.recorded_at|date:"M j, Y H:i" }}</td></tr>{% empty %}<tr><td colspan="3" class="py-10 text-center text-slate-400">No activities.</td></tr>{% endfor %}</tbody></table>
  <div class="p-5">{% include 'system_admin/includes/pagination.html' %}</div>
</div>
{% endblock %}
