{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
      <h2 class="text-2xl font-bold text-white mb-6 text-center">Set New Password</h2>
      {% if messages %}{% for m in messages %}
      <div class="mb-4 p-3 rounded-xl {% if m.tags == 'error' %}bg-red-500/20 text-red-300 border border-red-500/30{% else %}bg-emerald-500/20 text-emerald-300{% endif %} text-sm">{{ m }}</div>
      {% endfor %}{% endif %}
      <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
          <label class="text-sm text-slate-300 font-medium mb-1.5 block">New Password</label>
          <input type="password" name="password" id="pw" required
                 class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Min 8 chars, uppercase, number, special">
        </div>
        <div>
          <label class="text-sm text-slate-300 font-medium mb-1.5 block">Confirm Password</label>
          <input type="password" name="confirm_password" id="cpw" required
                 class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm" placeholder="Repeat password">
        </div>
        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-blue-600 to-violet-600 text-white font-bold rounded-xl transition hover:opacity-90">
          Reset Password
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
