{% extends 'base.html' %}
{% block title %}Verify OTP{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-blue-950 flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="bg-white/5 backdrop-blur-xl border border-white/10 rounded-3xl p-8 shadow-2xl">
      <div class="w-16 h-16 bg-violet-600/30 rounded-2xl flex items-center justify-center mx-auto mb-6">
        <i class="fas fa-shield-alt text-violet-400 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-white mb-2 text-center">Verify OTP</h2>
      <p class="text-slate-400 text-sm text-center mb-2">Enter the 6-digit code sent to</p>
      <p class="text-blue-400 text-sm text-center font-semibold mb-6">{{ email }}</p>
      {% if messages %}{% for m in messages %}
      <div class="mb-4 p-3 rounded-xl bg-red-500/20 text-red-300 border border-red-500/30 text-sm">{{ m }}</div>
      {% endfor %}{% endif %}
      <form method="POST" class="space-y-5">
        {% csrf_token %}
        <div>
          <input type="text" name="otp" required maxlength="6" placeholder="000000"
                 class="w-full px-4 py-4 bg-white/10 border border-white/20 rounded-xl text-white text-center text-3xl font-bold tracking-[1rem] placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-violet-500">
        </div>
        <button type="submit" class="w-full py-3.5 bg-gradient-to-r from-violet-600 to-blue-600 text-white font-bold rounded-xl transition hover:opacity-90">
          Verify OTP
        </button>
      </form>
      <p class="text-center mt-4 text-sm text-slate-400"><a href="/auth/forgot-password/" class="text-blue-400">Resend OTP</a></p>
    </div>
  </div>
</div>
{% endblock %}
